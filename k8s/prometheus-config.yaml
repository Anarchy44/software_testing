apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # ── Istio sidecar proxies (auto-discovered via Kubernetes SD) ──
      # Every pod with an istio-proxy container exposes Envoy metrics at :15020/stats/prometheus
      - job_name: 'istio-proxy'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: istio-proxy
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:15020
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
        metrics_path: /stats/prometheus
        scrape_interval: 15s

      # ── kubelet cAdvisor (container CPU / memory) ──
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor
        scrape_interval: 30s
        scrape_timeout: 10s
        honor_timestamps: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node

      # ── Custom diagnosis-service ──
      - job_name: 'diagnosis-service'
        static_configs:
          - targets: ['diagnosis-service.online-boutique.svc.cluster.local:8080']
        metrics_path: /metrics
        scrape_interval: 30s

      # ── Prometheus self-monitoring ──
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
