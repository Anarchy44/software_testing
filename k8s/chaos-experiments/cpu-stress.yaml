apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: productcatalog-cpu-stress
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: productcatalogservice
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: 10m
